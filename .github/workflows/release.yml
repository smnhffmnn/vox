name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            goos: darwin
            goarch: arm64
            binary: vox
            archive: tar.gz
          - runner: windows-latest
            goos: windows
            goarch: amd64
            binary: vox.exe
            archive: zip
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            binary: vox
            archive: tar.gz
          - runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            binary: vox
            archive: tar.gz
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set build variables
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "ARCHIVE_BASE=vox_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}" >> $GITHUB_ENV

      - name: Install Linux dependencies
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build

      - name: Build binary
        run: |
          go build -ldflags "-s -w -X main.version=${{ env.VERSION }}" \
            -o ${{ matrix.binary }} .

      - name: Create archive
        run: |
          if [ "${{ matrix.archive }}" = "zip" ]; then
            7z a ${{ env.ARCHIVE_BASE }}.zip ${{ matrix.binary }} LICENSE
          else
            tar czf ${{ env.ARCHIVE_BASE }}.tar.gz ${{ matrix.binary }} LICENSE
          fi

      - name: Create macOS .app bundle
        if: matrix.goos == 'darwin'
        run: |
          mkdir -p vox.app/Contents/MacOS
          mkdir -p vox.app/Contents/Resources

          cp vox vox.app/Contents/MacOS/vox
          sed "s/1.0.0/${{ env.VERSION }}/g" build/darwin/Info.plist > vox.app/Contents/Info.plist

          mkdir -p /tmp/icon.iconset
          for size in 16 32 128 256 512; do
            sips -z $size $size build/appicon.png --out /tmp/icon.iconset/icon_${size}x${size}.png 2>/dev/null
          done
          sips -z 32 32 build/appicon.png --out /tmp/icon.iconset/icon_16x16@2x.png 2>/dev/null
          sips -z 64 64 build/appicon.png --out /tmp/icon.iconset/icon_32x32@2x.png 2>/dev/null
          sips -z 256 256 build/appicon.png --out /tmp/icon.iconset/icon_128x128@2x.png 2>/dev/null
          sips -z 512 512 build/appicon.png --out /tmp/icon.iconset/icon_256x256@2x.png 2>/dev/null
          sips -z 1024 1024 build/appicon.png --out /tmp/icon.iconset/icon_512x512@2x.png 2>/dev/null
          iconutil -c icns /tmp/icon.iconset -o vox.app/Contents/Resources/appicon.icns
          rm -rf /tmp/icon.iconset

          /usr/libexec/PlistBuddy -c "Set :CFBundleIconFile appicon" vox.app/Contents/Info.plist

          tar czf vox_${{ env.VERSION }}_darwin_${{ matrix.goarch }}_app.tar.gz vox.app

      - name: Upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ matrix.archive }}" = "zip" ]; then
            gh release upload ${{ github.ref_name }} \
              ${{ env.ARCHIVE_BASE }}.zip --clobber
          else
            gh release upload ${{ github.ref_name }} \
              ${{ env.ARCHIVE_BASE }}.tar.gz --clobber
          fi

      - name: Upload .app bundle
        if: matrix.goos == 'darwin'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} \
            vox_${{ env.VERSION }}_darwin_${{ matrix.goarch }}_app.tar.gz --clobber

  checksums:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Generate SHA256 checksums
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/assets && cd /tmp/assets
          gh release download ${{ github.ref_name }} \
            --repo ${{ github.repository }} \
            --pattern '*.tar.gz' --pattern '*.zip'
          sha256sum * | sort > SHA256SUMS
          gh release upload ${{ github.ref_name }} SHA256SUMS \
            --repo ${{ github.repository }} --clobber

  homebrew:
    needs: [build, checksums]
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}

          REPO="${{ github.repository }}"
          FORMULA_URL="https://github.com/${REPO}/releases/download/${GITHUB_REF_NAME}/vox_${VERSION}_darwin_arm64.tar.gz"
          CASK_URL="https://github.com/${REPO}/releases/download/${GITHUB_REF_NAME}/vox_${VERSION}_darwin_arm64_app.tar.gz"

          curl -sL "$FORMULA_URL" -o formula.tar.gz
          curl -sL "$CASK_URL" -o cask.tar.gz

          FORMULA_SHA=$(sha256sum formula.tar.gz | cut -d' ' -f1)
          CASK_SHA=$(sha256sum cask.tar.gz | cut -d' ' -f1)

          git clone https://x-access-token:${TAP_TOKEN}@github.com/smnhffmnn/homebrew-tap.git tap
          cd tap

          cat > Formula/vox.rb << FORMULA
          class Vox < Formula
            desc "Cross-platform speech-to-text dictation tool"
            homepage "https://github.com/smnhffmnn/vox"
            version "${VERSION}"
            license "MIT"

            depends_on :macos
            depends_on arch: :arm64

            url "${FORMULA_URL}"
            sha256 "${FORMULA_SHA}"

            def install
              bin.install "vox"
            end

            test do
              assert_match "vox", shell_output("#{bin}/vox --version", 0)
            end
          end
          FORMULA

          mkdir -p Casks
          cat > Casks/vox.rb << CASK
          cask "vox" do
            version "${VERSION}"
            sha256 "${CASK_SHA}"

            url "${CASK_URL}"
            name "Vox"
            desc "Cross-platform speech-to-text dictation tool"
            homepage "https://github.com/smnhffmnn/vox"

            depends_on arch: :arm64

            app "vox.app"

            zap trash: [
              "~/.config/vox",
            ]
          end
          CASK

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/vox.rb Casks/vox.rb
          git commit -m "Update vox to ${VERSION}" || true
          git push
