name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            name: macOS
            binary: vox
          - runner: ubuntu-latest
            name: Linux
            binary: vox
          - runner: windows-latest
            name: Windows
            binary: vox.exe
    runs-on: ${{ matrix.runner }}
    name: test (${{ matrix.name }})
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build

      - name: Test
        run: go test ./...

      # Race detector only on Linux: worthwhile because app.go has real
      # concurrency (recordingMu, doubletapTimer, handsfreeTimer, atomic.Uint64),
      # and Linux is fast + stable for -race. macOS -race is slow and flaky on
      # audio/timer code; Windows -race with CGO adds little over Linux.
      - name: Test (race detector)
        if: runner.os == 'Linux'
        run: go test -race ./...

      - name: Build
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo dev)
          go build -ldflags "-s -w -X main.version=${VERSION}" -o ${{ matrix.binary }} .

      - name: Verify binary
        run: |
          ./${{ matrix.binary }} --version | grep -q "vox"
          echo "Binary verification passed"
